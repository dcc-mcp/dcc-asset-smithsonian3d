name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      RUN_LIVE_API_SMOKE: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip dcc-mcp-core pyyaml
      - run: python -m compileall skill tests
      - run: python tests/smoke_test.py

